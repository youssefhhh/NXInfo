    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-start: #000000;
            --bg-end: #0a0a0a;
            --text: #e0e0e0;
            --accent1: #b0b0b0;
            --accent2: #ffffff;
            --red: #e53935;
            --red-soft: #ff6b6b;
            --red-glow: rgba(229, 57, 53, 0.25);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255,255,255,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: transform 0.3s ease, color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.5;
            filter: brightness(0.5) contrast(1.2);
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7));
            z-index: -1;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 900px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7), 
                        0 0 40px rgba(229,57,53,0.06);
            transform: translateZ(100px) rotateX(5deg);
            border: 1px solid rgba(229,57,53,0.12);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateZ(100px) rotateX(5deg) translateY(0); }
            50% { transform: translateZ(100px) rotateX(5deg) translateY(-15px); }
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .social-link {

            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .social-link img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

            color: var(--red-soft);
            box-shadow: 0 0 25px var(--red-glow), 0 0 50px rgba(229,57,53,0.1);

        .clock {

            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);

        .feedback-btn {

            color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--red-glow);
        }

        @media (max-width: 768px) {

        .kissMyAss {

        .kissMyAss .button-start {

        .hero {
            display: flex;

        .brand.show {

        .roles-rotator {

            color: var(--text);
            opacity: 0;
            transform: translateY(12px) scale(0.98);
            filter: blur(6px);
            background: linear-gradient(to right, var(--red-soft), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .roles-rotator.show {
            animation: text-reveal 900ms ease-out 200ms forwards;
        }

        #visitorCount {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text);
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            cursor: default;
            position: relative;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #visitorCount::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #visitorCount:hover::before {
            opacity: 1;
        }

        #visitorCount svg {
            width: 24px;
            height: 24px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 5px rgba(229,57,53,0.3));
        }

        #visitorCount:hover svg {
            transform: scale(1.2) rotate(15deg);
            filter: drop-shadow(0 0 8px rgba(229,57,53,0.5));
        }

        #visitorCount svg path {
            fill: url(#eyeGradient);
        }

        #visitorCount .count {
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--red-soft), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            padding: 0 5px;
        }

        #visitorCount .count::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: linear-gradient(to right, var(--red), var(--red-soft));
            transition: width 0.3s ease;
        }

        #visitorCount:hover .count::after {
            width: 100%;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .visitor-ping {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: radial-gradient(circle, rgba(229,57,53,0.1) 0%, rgba(229,57,53,0) 70%);
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes ping {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
            70%, 100% { transform: translate(-50%, -50%) scale(1.7); opacity: 0; }
        }
        @keyframes text-reveal {
            0% { opacity: 0; filter: blur(8px); transform: translateY(12px) scale(0.98); }
            100% { opacity: 1; filter: blur(0); transform: none; }
        }
    </style>
</head>

    <audio id="backgroundMusic" loop>

    </audio>

    <script>
        let hour12 = true;
        function updateClock() {
            const now = new Date();
            const clock = document.getElementById('clock');
            const dateEl = document.getElementById('date');
            clock.textContent = now.toLocaleTimeString([], { hour12 });
            dateEl.textContent = now.toLocaleDateString([], { weekday: 'short', year: 'numeric', month: 'short', day: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.addEventListener("DOMContentLoaded", function () {
            const buttonStart = document.querySelector('.button-start');
            const enterWrapper = document.querySelector('.enter-wrapper');
            const kissMyAss = document.querySelector('.kissMyAss');
            const backgroundVideo = document.getElementById('background-video');
            const backgroundMusic = document.getElementById('backgroundMusic');
            const audioToggle = document.getElementById('audioToggle');
            const rolesEl = document.getElementById('rolesRotator');
            const brandEl = document.querySelector('.brand');
            const roles = [
                'TWEAKER',
                'PROGRAMER',
                'PC FIXER',
                'NX ESPORTS',
                'OWNER NX TWEAKER',
            ];
            let idx = 0;
            let rolesActive = true;
            let rolesTimeout;
            function scrambleTo(el, next) {
                const chars = '!<>-_\\/[]{}—=+*^?#';
                const len = next.length;
                let reveal = 0;
                return new Promise(resolve => {
                    const t = setInterval(() => {
                        let out = '';
                        for (let i = 0; i < len; i++) {
                            out += i < reveal ? next[i] : chars[Math.floor(Math.random() * chars.length)];
                        }
                        el.textContent = out;
                        reveal++;
                        if (reveal > len) {
                            clearInterval(t);
                            el.textContent = next;
                            resolve();
                        }
                    }, 30);
                });
            }
            async function cycleRoles() {
                if (!rolesActive) return;
                await scrambleTo(rolesEl, roles[idx]);
                idx = (idx + 1) % roles.length;
                rolesTimeout = setTimeout(cycleRoles, 1000);
            }
            cycleRoles();
            requestAnimationFrame(() => {
                brandEl.classList.add('show');
                rolesEl.classList.add('show');
            });

            function showEnter() {
                buttonStart.classList.add('show');
                enterWrapper.classList.add('show');
            }
            setTimeout(showEnter, 2000);

            buttonStart.addEventListener("click", function () {
                kissMyAss.style.opacity = '0';
                setTimeout(() => {
                    kissMyAss.style.display = 'none'; 
                }, 1000);
                rolesActive = false;
                clearTimeout(rolesTimeout);

                backgroundVideo.style.display = 'block';
                backgroundVideo.play();
                backgroundVideo.muted = false;
                backgroundMusic.muted = false;
                backgroundMusic.play().catch(()=>{});
                audioToggle.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                audioToggle.classList.add('active');
            });

            audioToggle.addEventListener('click', () => {
                const nextMuted = !(backgroundMusic.muted || backgroundVideo.muted);
                backgroundMusic.muted = nextMuted;
                backgroundVideo.muted = nextMuted;
                audioToggle.innerHTML = nextMuted
                    ? '<i class="fa-solid fa-volume-xmark"></i>'
                    : '<i class="fa-solid fa-volume-high"></i>';
                audioToggle.classList.toggle('active', !nextMuted);
            });

            document.getElementById('clock').addEventListener('click', () => {
                hour12 = !hour12;
                updateClock();
            });
        });
    </script>
